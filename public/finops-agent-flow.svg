<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">FinOps agent workflow</title>
  <desc id="desc">Grid chat sends a FinOps question to the FinOps agent, which queries LiteLLM MCP, reads LiteLLM usage data, and returns a visual report.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="var(--shadow-color)" flood-opacity="var(--shadow-opacity)"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--arrow)"/>
    </marker>
  </defs>
  <style>
    :root {
      color-scheme: light dark;
      --page-bg: #f8fafc;
      --card-bg: #ffffff;
      --card-border-blue: #dbeafe;
      --card-border-amber: #fde68a;
      --card-border-green: #bbf7d0;
      --text: #0f172a;
      --muted: #64748b;
      --shadow-color: #0f172a;
      --shadow-opacity: 0.10;
      --arrow: #94a3b8;
      --teal-accent: #14b8a6;
      --teal-icon-bg: #ccfbf1;
      --teal-icon: #0f766e;
      --blue-accent: #3b82f6;
      --blue-icon-bg: #dbeafe;
      --blue-icon: #2563eb;
      --amber-accent: #eab308;
      --amber-icon-bg: #fef3c7;
      --amber-icon: #b45309;
      --green-icon-bg: #dcfce7;
      --green-icon: #15803d;
      --examples-bg: #e0f2fe;
      --examples-title: #075985;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg: #020617;
        --card-bg: #0f172a;
        --card-border-blue: #1e3a8a;
        --card-border-amber: #854d0e;
        --card-border-green: #166534;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --shadow-color: #000000;
        --shadow-opacity: 0.45;
        --arrow: #64748b;
        --teal-accent: #2dd4bf;
        --teal-icon-bg: #134e4a;
        --teal-icon: #5eead4;
        --blue-accent: #60a5fa;
        --blue-icon-bg: #172554;
        --blue-icon: #93c5fd;
        --amber-accent: #fbbf24;
        --amber-icon-bg: #451a03;
        --amber-icon: #fcd34d;
        --green-icon-bg: #14532d;
        --green-icon: #86efac;
        --examples-bg: #0f172a;
        --examples-title: #67e8f9;
      }
    }
  </style>
  <rect width="1200" height="360" rx="0" fill="var(--page-bg)"/>
  <text x="48" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="var(--text)">FinOps Agent for LiteLLM reporting</text>
  <text x="48" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="var(--muted)">Ask in Grid chat, get usage, spend, token, model, and user reports with downloadable visual charts.</text>

  <g transform="translate(48 128)">
    <rect x="0" y="0" width="190" height="124" rx="12" fill="var(--card-bg)" stroke="var(--card-border-blue)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="10" height="124" rx="5" fill="var(--teal-accent)"/>
    <circle cx="58" cy="48" r="24" fill="var(--teal-icon-bg)"/>
    <path d="M47 47h22M47 55h14M47 39h22" stroke="var(--teal-icon)" stroke-width="4" stroke-linecap="round"/>
    <text x="94" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="var(--text)">Grid chat</text>
    <text x="94" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="var(--muted)">Ask a FinOps</text>
    <text x="94" y="91" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="var(--muted)">question</text>
  </g>

  <line x1="260" y1="190" x2="350" y2="190" stroke="var(--arrow)" stroke-width="6" marker-end="url(#arrow)"/>

  <g transform="translate(374 128)">
    <rect x="0" y="0" width="210" height="124" rx="12" fill="var(--card-bg)" stroke="var(--card-border-blue)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="10" height="124" rx="5" fill="var(--blue-accent)"/>
    <circle cx="58" cy="48" r="24" fill="var(--blue-icon-bg)"/>
    <path d="M50 52v-9c0-5 4-9 9-9s9 4 9 9v9M45 52h28v17H45zM54 60h1M64 60h1" stroke="var(--blue-icon)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="94" y="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="var(--text)">FinOps agent</text>
    <text x="94" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="var(--muted)">Selects the right</text>
    <text x="94" y="89" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="var(--muted)">report tool</text>
  </g>

  <line x1="606" y1="190" x2="696" y2="190" stroke="var(--arrow)" stroke-width="6" marker-end="url(#arrow)"/>

  <g transform="translate(720 128)">
    <rect x="0" y="0" width="190" height="124" rx="12" fill="var(--card-bg)" stroke="var(--card-border-amber)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="10" height="124" rx="5" fill="var(--amber-accent)"/>
    <circle cx="58" cy="48" r="24" fill="var(--amber-icon-bg)"/>
    <path d="M58 30v21M47 38v13c0 9 22 9 22 0V38M58 60v13" stroke="var(--amber-icon)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <text x="94" y="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="var(--text)">LiteLLM MCP</text>
    <text x="94" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="var(--muted)">Read-only access</text>
    <text x="94" y="89" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="var(--muted)">to usage data</text>
  </g>

  <line x1="932" y1="190" x2="1022" y2="190" stroke="var(--arrow)" stroke-width="6" marker-end="url(#arrow)"/>

  <g transform="translate(1046 128)">
    <rect x="0" y="0" width="106" height="124" rx="12" fill="var(--card-bg)" stroke="var(--card-border-green)" filter="url(#shadow)"/>
    <circle cx="53" cy="42" r="24" fill="var(--green-icon-bg)"/>
    <path d="M42 51h22M42 42h22M42 33h22M42 33v27h22V33" stroke="var(--green-icon)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="21" y="85" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="var(--text)">Report</text>
    <text x="18" y="106" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="var(--muted)">HTML + CSV</text>
  </g>

  <g transform="translate(48 292)">
    <rect x="0" y="0" width="1104" height="34" rx="17" fill="var(--examples-bg)"/>
    <text x="28" y="23" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="var(--examples-title)">Example requests:</text>
    <text x="164" y="23" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="var(--text)">"Show token usage for FY26Q3"  |  "Spend per LLM last quarter"  |  "Usage and spend per user for April"</text>
  </g>
</svg>
